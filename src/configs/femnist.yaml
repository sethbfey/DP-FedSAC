# src/config/femnist.yaml

wandb:
  project_name: "DP-FedSAC"
  entity: "sethbfey-university-of-south-dakota"
  log_interval: 10

federated_learning:
  num_clients: 3597      # all LEAF FEMNIST clients
  clients_per_round: 100 # K: matches Andrew et al. (2021)
  num_global_steps: 3000 # T: at max_epsilon=6.72, budget lasts ~5700 rounds (sigma=2.0), so T is the binding limit
  local_epochs: 1        # E: matches Andrew et al.
  learning_rate: 0.1     # eta_c: client LR; calibrated from `src/scripts/learning_rate_search.py --config "femnist"`
  server_lr: 1.0         # eta_s: server LR; calibrated from `src/scripts/learning_rate_search.py --config "femnist"`
  batch_size: 32
  server_momentum: 0.0   # McMahan et al. (2018) DP-FedAvg uses no server momentum
  dataset: "femnist"

differential_privacy:
  rdp_alpha: 10              # RDP accounting divergence order
  target_delta: 0.00001      # (epsilon, delta)-DP failure probability delta
  max_epsilon: 6.72          # Total RDP budget; final (epsilon, delta)-DP ≈ (8.0, 1e-5)
  max_clipping_norm: 0.7336  # Calibrated from `python src/scripts/train_baselines.py --baseline fedavg`
  max_noise_multiplier: 5.0  # Upper bound for sigma_t
  min_noise_multiplier: 2.0  # Lower bound for sigma_t